name = "aresweb"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "ares-db"
database_id = "24d5e2b3-5ad5-4e17-9c73-76b9a0030d16"

[[r2_buckets]]
binding = "ARES_STORAGE"
bucket_name = "ares-media"

[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "d7be46d8eb9049b78c32791b31c17301"
preview_id = "228df7ca14b7464b92d5dbe1516ba94c"

# DEV_BYPASS removed from production config (security audit item #1).
# For local development, use: wrangler dev --var DEV_BYPASS:true

[env.preview]
[[env.preview.d1_databases]]
binding = "DB"
database_name = "ares-db-preview"
database_id = "09c4aafb-89fd-4735-930e-3ff8e2289c34"

# AI and Vectorize bindings removed to unblock Cloudflare Pages deployment.
# The Vectorize index 'ares_knowledge_base' must be created before re-enabling:
#   npx wrangler vectorize create ares_knowledge_base --dimensions 768 --metric cosine
# Once created, uncomment the bindings below:
# [ai]
# binding = "AI"
#
# [[vectorize]]
# binding = "VECTORIZE_DB"
# index_name = "ares_knowledge_base"
